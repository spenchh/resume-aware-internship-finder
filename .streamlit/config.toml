# Streamlit app config (used locally and on Streamlit Community Cloud).
# Cool, cozy palette — soft indigo/sky on a light tinted background.
[theme]
primaryColor = "#5b7cfa"            # cool indigo — buttons, accents
backgroundColor = "#f4f7fc"         # main area, gentle cool tint
secondaryBackgroundColor = "#ffffff" # cards, sidebar, inputs
textColor = "#1e293b"               # slate
font = "sans serif"

[server]
maxUploadSize = 10                  # MB — resumes are tiny
