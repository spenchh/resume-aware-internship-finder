# Streamlit app config (used locally and on Streamlit Community Cloud).
# Dark, sharp, trustworthy — a focused "career search cockpit", not neon.
[theme]
base = "dark"
primaryColor = "#22D3A6"              # teal accent — primary CTA, focus rings
backgroundColor = "#080B10"           # near-black main area (not pure black)
secondaryBackgroundColor = "#111722"  # surfaces, sidebar, inputs
textColor = "#F4F7FB"                 # primary text
font = "sans serif"

[server]
maxUploadSize = 10                    # MB — resumes are tiny
