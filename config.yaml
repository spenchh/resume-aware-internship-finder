# =============================================================================
# Resume-Aware Internship Finder — default configuration
# =============================================================================
# Everything here can be overridden on the CLI (see `python main.py --help`).
# Edit freely. Wrong/stale ATS slugs are harmless: a 404 just yields no rows and
# is logged so you can prune the list.

# ---- Search targeting -------------------------------------------------------
search:
  term: ""                     # optional target internship term; blank = any term
  # What field/roles the candidate wants. Leave blank to search broadly and
  # infer ranking from the resume.
  # Leave blank to infer purely from the resume. The web app fills this in.
  target_role: ""              # e.g. "marketing", "finance", "UX design", "biology"
  # General internship signals. The resume parser augments this with terms from
  # the resume and the target field the user enters.
  role_keywords:
    - intern
    - internship
    - co-op
  locations:                    # empty list = no location filter
    - United States
    - Remote
  remote_preference: any        # any | remote | hybrid | onsite
  include_startups: false       # startup add-on is opt-in, not the default search

# ---- Freshness windows (Section 3.3 / 6) -----------------------------------
freshness:
  recency_days: 21              # "posted within last N days" qualifies
  deadline_lookahead_days: 14   # "deadline within next N days" qualifies
  live_check: true              # re-verify every retained URL before reporting (Section 6.4)
  live_check_timeout: 12        # seconds per live-check request
  include_unverified: true      # keep listings whose date can't be verified, flagged + sorted below

# ---- HTTP politeness (Section 12) ------------------------------------------
http:
  user_agent: "internfinder/1.0 (+personal-job-search; contact: set-in-config)"
  request_timeout: 20
  rate_limit_per_host_sec: 1.0  # min seconds between requests to the same host
  max_retries: 3
  backoff_base_sec: 1.5         # exponential backoff base
  respect_robots: true          # skip disallowed paths

# ---- Matching / scoring (Section 7) ----------------------------------------
matching:
  use_llm: auto                 # auto | always | never
  llm_provider: auto            # auto | openrouter | anthropic
  openrouter_model: "z-ai/glm-5.2" # open-weight default via OpenRouter
  llm_model: "claude-haiku-4-5" # Claude fallback/default if ANTHROPIC_API_KEY is set
  llm_max_listings: 60          # cap LLM calls per run to control cost
  min_score_to_report: 0        # show everything found; sort/filter by match score in the UI

# ---- Sources ----------------------------------------------------------------
# No preset company boards are enabled by default, so results are not secretly
# biased toward any field. Add company slugs only when you intentionally want to
# search those specific boards: boards.greenhouse.io/<slug>,
# jobs.lever.co/<slug>, jobs.ashbyhq.com/<slug>.
sources:
  greenhouse:
    enabled: true
    companies: []

  lever:
    enabled: true
    companies: []

  ashby:
    enabled: true
    companies: []

  # Arbitrary career-page URLs to scrape for schema.org JobPosting JSON-LD
  # (Section 4 Tier 1, item 2). Most reliable date source when present.
  schemaorg_urls:
    enabled: true
    urls: []                    # add direct career-page or listing URLs here

  # Tier 1, item 3 — community-curated tracking repos. Freshness gold because
  # maintainers manually mark closures. Repo last-commit date is checked first;
  # a stale repo is skipped. {raw README is parsed as a markdown table}.
  github_lists:
    enabled: true
    repos: []                   # add curated repos only if you want that specific list
    max_commit_age_days: 14     # skip repo if no commits within this window

  # Tier 2 — startup-specific add-on.
  yc_jobs:
    enabled: false
    # Empty selectors = use the broad public YC company dataset, then rank toward
    # active/hiring/small/recent companies before probing public profile jobs and
    # ATS boards. Add selectors only if you intentionally want a narrower startup
    # segment.
    selectors: []
    active_only: true
    hiring_only: true
    profile_first: true        # YC public profile jobs are faster for small startups than ATS guessing
    skip_ats_when_profile_has_jobs: true
    small_team_max: 50          # prefer true small startups; unknown team size is allowed
    recent_batch_year_min: 2020 # prefer recent YC batches when the batch is known
    max_companies: 40           # cap how many YC company ATS boards to probe

  wellfound:
    enabled: false              # requires login/official access; off by default (Section 12)

  # Tier 3 — general aggregator for breadth (weighted lower on trust).
  serpapi_google_jobs:
    enabled: true               # auto-skips if SERPAPI_API_KEY is unset
    max_results: 100            # total rows kept across all SerpAPI query variants
    max_locations: 2            # first N configured locations to query
    startup_breadth: false      # add web-wide startup searches only when opted in
    startup_query_terms:
      - startup internship
      - early stage startup internship
      - small startup internship
      - venture backed startup internship

# ---- Optional domain weighting ---------------------------------------------
# Empty by default so the tool does not favor engineering, hardware, software,
# or any other field unless the user asks for that field or the resume contains it.
domain:
  priority_keywords: []
  priority_sectors: []

# ---- Output -----------------------------------------------------------------
output:
  format: markdown              # markdown | html | both
  directory: reports
